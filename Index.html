
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BISE Lahore Result</title>

<style>

body{
font-family:Arial;
background:#dfe6cf;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
min-height:100vh;
margin:0;
}

.main-box{
width:330px;
background:#f7f7f7;
border:2px solid #9db38c;
border-radius:8px;
padding:15px;
text-align:center;
}

.logo{
width:70px;
margin-bottom:5px;
}

.heading{
font-size:26px;
font-weight:bold;
}

.subheading{
font-size:12px;
color:#444;
}

.title{
font-weight:bold;
color:#2f6f2f;
margin:10px 0;
font-size:18px;
}

.line{
border-top:3px solid #2f6f2f;
margin:10px 0;
}

.radio-box{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.form-row{
display:flex;
align-items:center;
margin-top:6px;
}

.label{
background:#6aa16a;
color:white;
font-size:12px;
padding:5px;
width:100px;
text-align:left;
}

input,select{
flex:1;
padding:6px;
border:1px solid #999;
border-left:none;
}

.captcha{
margin-top:1
background:white;
border:2px solid #6aa16a;
padding:10px;
font-weight:bold;
letter-spacing:2px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.refresh{
background:#2f6f2f;
color:white;
width:25px;
height:25px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.btn{
margin-top:12px;
background:#2f6f2f;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.footer{
font-size:10px;
margin-top:8px;
}

</style>

</head>

<body>

<div class="main-box">

<img src="https://raw.githubusercontent.com/CodewithAli147/Myphoto.jpg/3813e807ebc6e2f47f939ae55eb909c25100545f/Picsart_26-02-28_16-02-57-566.png" class="logo">

<div class="heading">BISE LAHORE</div>

<div class="subheading">
Board of Intermediate and Secondary Education, Lahore
</div>

<div class="title">Previous Results</div>

<div class="line"></div>

<div class="radio-box">

<label>
<input type="radio" name="classType" value="matric" checked> Matric
</label>

<label>
<input type="radio" name="classType" value="intermediate"> Intermediate
</label>

</div>

<div class="line"></div>

<div class="form-row">
<div class="label">RollNo:</div>
<input type="text" id="roll">
</div>

<div class="form-row">
<div class="label">ExamType</div>
<select>
<option>SUPPLEMENTARY</option>
<option>ANNUAL</option>
</select>
</div>

<div class="form-row">
<div class="label">Year:</div>
<select>
<option>2024</option>
<option>2023</option>
<option>2022</option>
<option>2021</option>
<option>2020</option>
<option>2019</option>
<option>2018</option>
<option>2017</option>
<option>2016</option>
<option>2015</option>
<option>2014</option>
<option>2013</option>
<option>2012</option>
<option>2011</option>
<option>2010</option>
</select>
</div>

<div class="form-row">
<div class="label">Enter Captcha:</div>
<input type="text" id="userCaptcha">
</div>

<div class="captcha">

<span id="captchaText"></span>

<div class="refresh" onclick="generateCaptcha()">↻</div>

</div>

<button class="btn" onclick="checkResult()">VIEW RESULT</button>

<div class="footer">
Powered by: Board of Intermediate and Secondary Education, Lahore (COMPUTER SECTION)
</div>

</div>

<script>

var captcha="";

function generateCaptcha(){

var chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
captcha="";

for(var i=0;i<6;i++){
captcha+=chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("captchaText").innerText=captcha;

}

generateCaptcha();


function checkResult(){

var roll=document.getElementById("roll").value;
var userCaptcha=document.getElementById("userCaptcha").value;

if(userCaptcha!=captcha){

alert("Captcha Incorrect");
generateCaptcha();
return;

}

if(roll=="113652"){

window.open("https://www.scribd.com/document/1013081350/Muhammad-Azhar-Matric-Result-Card-2022-Roll-No-113652","_blank");

}

else if(roll=="803652"){

window.open("https://www.scribd.com/document/1019085662/BISE-Lahore-Result-2018-Memoona-Riaz-Roll-Number-803652-Full-Marksheet","_blank");

}

else{

alert("Result Not Found");

}

}

</script>

</body>
  </html>
